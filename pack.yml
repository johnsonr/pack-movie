name: movie
description: |
  Movie recommendations grounded in what the user has rated, what's actually
  streamable in their country, and live OMDb metadata. Ships three short
  Agent Skills — `recommend-movie` (pick something to watch / where can I
  stream X), `rate-movie` (record a rating), `recall-movies` (read prior
  ratings) — backed by the `Movie` and `MovieRating` types so ratings
  persist into the workspace graph and feed back into future
  recommendations. The bundled `roger` personality gives the
  recommendation write-up a Roger-Ebert voice.
version: 0.3.0
author: Rod Johnson
url: https://github.com/johnsonr/pack-movie
tags:
  - movies
  - recommendations
  - openapi
  - skills
  - personalities
exports:
  - omdb
  - streaming_availability
  - movie
  - roger
  - Movie
  - MovieRating
  - StreamingService
  - UserStreamingSubscription
  - MovieTasteSummary
  - MovieReview
