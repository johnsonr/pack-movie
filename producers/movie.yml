# Virtual-join producers for the movie pack (see specs/VIRTUAL_CYPHER.md and
# specs/RESUMABLE_PRODUCERS_PLAN.md in the assistant repo).
#
# similarMovies: a KNOWLEDGE producer (kind: knowledge) — the SIMILAR_TO edge is sourced from the
# assistant's own film knowledge, NOT an API (OMDb has no "similar" endpoint). Film similarity is
# STATIC world knowledge, so parametric memory is the right source and the edge is persisted after
# first fetch. It is RESUMABLE: the engine can ask for MORE similar films (excluding ones already
# suggested or already rated) until it has enough unseen recommendations — the generator model.
#
# The model is NOT pinned here (a pack must never hardcode a model); the backend uses the ops-controlled
# InfrastructureProperties.knowledgeEdgeLlm. This spec carries only source-agnostic knowledge config.
#
# resolveVia canonicalizes each LLM-emitted title onto the Movie spine: omdb.getMovie(t=title) → imdbID,
# projected to imdbId. A title OMDb can't resolve is dropped (you can't recommend a film you can't
# identify), which also keeps the anti-join against already-rated imdbIds correct.

- name: similarMovies
  kind: generative         # GENERATES the edge (resumably) rather than reading it from a store
  edgeType: SIMILAR_TO
  identityField: imdbId
  anchorKeyField: similarTo
  nameField: title         # the human name the generator emits (a film title), pre-resolution
  volatility: static
  confidenceFloor: 0.3
  defaultWant: 25          # a view has no LIMIT; keep generating to ~25 survivors (most films get filtered out)
  # The generator is an LLM; the prompt is PACK-AUTHORED (the host generative backend is domain-agnostic —
  # it ships no film prompt). Rendered with anchors/exclude/want/round/constraints (pushed-down predicates).
  generator:
    kind: llm
    prompt: |
      You are a film-knowledge oracle. For each numbered film below, name other films a fan of it
      would very likely also enjoy — genuinely similar in style, theme, director, or era.

      Films:
      {% for a in anchors %}{{ a.n }}. {{ a.title }}
      {% endfor %}
      {% if exclude %}
      Do NOT suggest any of these already-known films (the user has seen them, or you already suggested them):
      {% for e in exclude %}- {{ e }}
      {% endfor %}
      {% endif %}
      {% if constraints %}
      Additionally, only suggest films that satisfy ALL of these constraints (skip any that don't):
      {% for c in constraints %}- {{ c }}
      {% endfor %}
      {% endif %}
      {% if hint %}
      The viewer has a specific request: {{ hint }}. Treat it as a HARD requirement — EVERY film you
      suggest MUST clearly satisfy "{{ hint }}". This OVERRIDES similarity: if a film is a great match
      to the anchors but does not satisfy the request, DROP it and pick one that does. Never include a
      film that only partly fits just to reach the count — a shorter list of true matches is better.
      {% endif %}
      Rules:
      - Suggest up to {{ want }} films in total across all the numbered films.
      - Set `sourceIndex` to the number of the film each suggestion is similar to.
      - `title` is the suggested film's exact, well-known title.
      - `confidence` is 0.0-1.0: how sure you are the film exists AND is genuinely similar. Be honest —
        lower it for obscure or tenuous picks; do not invent films to reach the count.
      - Never repeat a film from the exclude list or from your own suggestions.
  resolveVia:
    name: resolveTitle
    kind: remote
    operation: getMovie            # bare gateway op-id (like openalex's `searchWorks`), NOT `omdb.getMovie`
    args:
      t: "{keys}"
    keyTemplate: "{key}"
    records: "$"
    project:                # fill Movie's FULL property surface, not just identity
      imdbId: imdbID
      title: Title
      year: Year
      genre: Genre
      country: Country
      director: Director
      runtimeMinutes: Runtime
      plot: Plot
      imdbRating: imdbRating
      poster: Poster
  cache:
    kind: ttl
    seconds: 2592000        # 30 days — static fact

# movieByImdbId: the OF edge's producer — fetch the canonical Movie for a MovieRating by its imdbId. A plain
# remote producer over OMDb's getMovie(i=imdbId). This lets a query cross from a rating to the film's full
# metadata (and onward to reviews/streaming) WITHOUT the user having pre-materialized the Movie: the rating
# carries only imdbId + title, so
#   MATCH (u:AssistantUser)-[:RATED]->(rt:MovieRating) WITH rt ORDER BY rt.rating DESC LIMIT 3
#   MATCH (rt)-[:OF]->(m:Movie)-[:HAS_REVIEW]->(r:MovieReview) RETURN m.title, r.title, r.score
# resolves the top-3 rated films then their reviews in ONE query. echoKeyAs is unnecessary — OMDb returns the
# canonical imdbID (projected to imdbId), which equals the queried key, so OF links back by imdbId. Static
# metadata → 30-day cache, matching the Movie retrieval and similarMovies resolution.
- name: movieByImdbId
  kind: remote
  operation: getMovie
  args:
    i: "{keys}"
  keyTemplate: "{key}"
  records: "$"
  project:
    imdbId: imdbID
    title: Title
    year: Year
    genre: Genre
    country: Country
    director: Director
    runtimeMinutes: Runtime
    plot: Plot
    imdbRating: imdbRating
    poster: Poster
  cache:
    kind: ttl
    seconds: 2592000                  # 30 days — static metadata, same as the Movie retrieval

# streamingByImdb: where a Movie can be streamed IN THE USER'S COUNTRY — a plain remote producer over
# the Streaming Availability API (getShow by imdbId + country). Powers the AVAILABLE_ON join, which
# filters recommendations to films the user can actually watch. echoKeyAs stamps the queried imdbId onto
# each option so AVAILABLE_ON links back to its Movie; per-key fetch (one getShow per film) follows.
#
# COUNTRY is 'au' here (the parked personalization follow-up, like multi-user scoping): it should come
# from the user's profile, not be pinned in a shared pack. The response is a map keyed by country, and
# we requested one, so `$.streamingOptions.au[*]` is that country's option array.
- name: streamingByImdb
  kind: remote
  operation: getShow
  args:
    id: "{keys}"
    country: "au"
  keyTemplate: "{key}"
  echoKeyAs: imdbId                 # stamp the queried imdbId so AVAILABLE_ON matches Movie.imdbId
  records: "$.streamingOptions.au[*]"
  project:
    serviceId: "service.id"
    serviceName: "service.name"
    watchLink: "link"
    offerType: "type"
  cache:
    kind: ttl
    seconds: 86400                  # 1 day — availability drifts, but not minutely

# movieTasteSummary: the fan-IN producer behind HAS_MOVIE_TASTE_SUMMARY. The mirror of similarMovies — where
# that GENERATES many films off one rating, this GATHERS all the user's MovieRatings and REDUCES them to ONE
# MovieTasteSummary node. It reuses the `synthesize` LLM aggregation (the same fan-in function a query can call
# inline), so there's one implementation of "LLM-reduce a group of text". Domain-free host: the traversal,
# the per-rating text, and the reduction goal are ALL here in the pack (no model pinned — the aggregation
# uses the ops-controlled InfrastructureProperties.aggregationLlm). Cached weekly, so the summary refreshes
# once every 7 days per user rather than on every read. Movie-prefixed name/edge to avoid cross-pack collision.
- name: movieTasteSummary
  kind: aggregate
  edgeType: HAS_MOVIE_TASTE_SUMMARY
  identityField: userId           # one summary per user (MERGE on the workspace id folds the identity spellings)
  anchorKeyField: anchorKey       # the join's recordKeyField — echoes each received anchor-identity spelling so
                                  # every email of (me:AssistantUser) links to the single node
  collect:
    anchorLabel: AssistantUser
    via: RATED
    targetLabel: MovieRating
    # One text item per rating. ALL ratings count — a 2/10 is taste signal (what they avoid), not noise.
    text: "{{ title }} — rated {{ rating }}/10{% if notes %} · {{ notes }}{% endif %}"
  reduce:
    using: synthesize             # the goal-directed LLM fan-in aggregation
    into: summary
    args:
      - >-
        In about 100 words and the second person ("you"), sum up this person's taste in film from their ratings
        (10 = loved, 1 = hated): the directors, genres, eras, countries, and moods they gravitate toward, and
        what they avoid. Be concrete and specific — name the through-lines. No preamble; just the summary.
  cache:
    kind: ttl
    seconds: 604800                 # 7 days — a weekly-refreshed summary

# tasteBasedPicks: recommendations from your TASTE as a whole, not from any one film. A `generative` producer
# (exactly like similarMovies) but anchored on the MovieTasteSummary node — its `summary` PROSE is the generator
# input, so the chain is fan-IN (ratings → one summary node) then fan-OUT (summary → many films). Films matching
# a described taste are world knowledge → volatility static (parametric LLM allowed). Each pick is resolved onto
# the Movie spine via OMDb so it dedupes against already-rated films, same as similarMovies.
- name: tasteBasedPicks
  kind: generative
  edgeType: SUGGESTS
  identityField: imdbId
  anchorKeyField: fromTaste        # echoes the summary key so every pick links back to the one MovieTasteSummary
  nameField: title
  volatility: static
  confidenceFloor: 0.3
  defaultWant: 25
  generator:
    kind: llm
    prompt: |
      You are a film curator. Below is a prose description of one person's taste in film. Recommend films they
      would very likely LOVE because they match this taste — the same directors, genres, eras, countries, moods,
      and sensibility described. Prefer non-obvious picks over the most famous titles.

      Their taste:
      {% for a in anchors %}{{ a.title }}
      {% endfor %}
      {% if exclude %}
      Do NOT suggest any of these (already known, seen, or already suggested — ignore any that look like a
      paragraph rather than a film title):
      {% for e in exclude %}- {{ e }}
      {% endfor %}
      {% endif %}
      {% if constraints %}
      Only suggest films that satisfy ALL of these constraints (skip any that don't):
      {% for c in constraints %}- {{ c }}
      {% endfor %}
      {% endif %}
      {% if hint %}
      The viewer has a specific request: {{ hint }}. Treat it as a HARD requirement — EVERY film you
      suggest MUST clearly satisfy "{{ hint }}". This OVERRIDES similarity: if a film is a great match
      to the anchors but does not satisfy the request, DROP it and pick one that does. Never include a
      film that only partly fits just to reach the count — a shorter list of true matches is better.
      {% endif %}
      Rules:
      - Suggest up to {{ want }} films in total.
      - Set `sourceIndex` to 1 (there is a single taste description).
      - `title` is the film's exact, well-known title.
      - `confidence` is 0.0-1.0: how sure you are the film exists AND genuinely fits this taste. Be honest;
        don't invent films to reach the count.
  resolveVia:
    name: resolveTitle
    kind: remote
    operation: getMovie
    args:
      t: "{keys}"
    keyTemplate: "{key}"
    records: "$"
    project:
      imdbId: imdbID
      title: Title
      year: Year
      genre: Genre
      country: Country
      director: Director
      runtimeMinutes: Runtime
      plot: Plot
      imdbRating: imdbRating
      poster: Poster
  cache:
    kind: ttl
    seconds: 604800                 # weekly — matches the summary's refresh cadence

# movieReviews: a PROMPTED, WEB-GROUNDED edge that returns the MovieReview type. The mirror of similarMovies as
# an LLM producer, with two additions: `tools: [web]` (so it looks up REAL reviews, not stale parametric memory
# — which also relaxes the volatility gate: `slow` is allowed BECAUSE it's tool-grounded), and NO resolveVia
# (the LLM emits the target type's fields directly — url/title/publication/… — instead of a name for OMDb to
# resolve). MANY reviews per film, each keyed by its url; the film title is the search key. Cached weekly.
- name: movieReviews
  kind: generative
  edgeType: HAS_REVIEW
  identityField: url              # each review is a distinct node keyed by its link
  nameField: url                  # keyed/deduped by url (typed mode)
  anchorKeyField: movieTitle      # echoes the anchor Movie's title so each review links back to its film
  volatility: slow                # allowed because the generator is tool-grounded (web), not parametric
  defaultWant: 6                  # aim for several reviews per film
  generator:
    kind: llm
    tools: [web]                  # attach the workspace's web-search tool(s); host appends the JSON contract
    prompt: |
      You are a film critic's research assistant. For each numbered film below, use web search to find several
      (up to {{ want }}) real, individual published reviews, and return one record PER review — grounded in the
      pages you actually find, never invented.

      Films:
      {% for a in anchors %}{{ a.n }}. {{ a.title }}
      {% endfor %}
      For EACH review return these fields (omit any you can't ground; skip a review whose url you can't confirm):
      - url: the direct link to the review.
      - title: the review's headline / title.
      - publication: the outlet it appeared in (e.g. The Guardian, RogerEbert.com).
      - author: the critic's name, if given.
      - excerpt: one representative sentence or two, quoted from the review.
      - reviewDate: the publication date as ISO-8601 (YYYY-MM-DD) if shown; omit if not.
      - sentiment: 'positive', 'mixed', or 'negative'.
      - originalScore: the rating exactly as given (e.g. '4/5', 'A-', '★★★★'); omit if none.
      - score: that rating normalized to 0-10, if it is numeric-convertible.
      - verdict: a one-sentence takeaway of the review's verdict.
      Set `sourceIndex` to the film's number. Return MULTIPLE objects per film (one per review).
  cache:
    kind: ttl
    seconds: 604800               # weekly — reviews accrue slowly
