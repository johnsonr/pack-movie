# Named Cypher VIEWS (no JavaScript) — they appear in the Cypher console's Views list and run as
# `MATCH (v:<Name>) RETURN v`, returning entity-card nodes. The SIMILAR_TO / AVAILABLE_ON /
# HAS_MOVIE_TASTE_SUMMARY edges are virtual: they materialize on demand when the view body runs, inside the
# scoped, rolled-back read. `(me:AssistantUser)` is NAMED so the scope rewriter binds it to the current user
# (private MovieRating never leaks across users). The taste summary USED to need a JS lens (an inline LLM call);
# now that it is the `MovieTasteSummary` virtual NODE, the LLM reduction happens in the producer and this stays
# pure Cypher too (see MyFilmTaste below). Per-service tagging still needs a lens — see ../lenses/.

# Your rated films with their full Movie metadata, best-rated first. PARAMETERIZED (bind variables
# with defaults — the host's specs/PARAMETERIZED_VIEWS_MCP.md): run bare for your top 10, or tune
# via an inline argument map on the label: MATCH (m:RatedMovies {limit: 3, minRating: 8}) RETURN m.
# The OF hop is the virtual spine edge — each film is fetched by imdbId on demand — so `limit` also
# BOUNDS the per-film fetch fan-out by construction. Replaces the former rated-movies JS lens, which
# needed persisted Movie nodes that this pack's virtual design never stores.
- name: RatedMovies
  description: The films you've rated, with their full details — your highest-rated first.
  outputLabel: Movie
  params:
    limit:
      type: int
      default: 10
      description: "Maximum films to return (also caps the per-film metadata fetches)."
    minRating:
      type: int
      default: 1
      description: "Only include films you rated at least this (1-10)."
  cypher: |
    MATCH (me:AssistantUser)-[:RATED]->(rt:MovieRating) WHERE rt.rating >= $minRating
    WITH rt ORDER BY rt.rating DESC, rt.title ASC LIMIT $limit
    MATCH (rt)-[:OF]->(m:Movie)
    RETURN DISTINCT m

# Films similar to ones you rated highly, that you haven't already seen. PARAMETERIZED: `steer` is a
# free-text soft steer flowing into the SIMILAR_TO generator's `{ai: {hint}}` directive (empty = unsteered,
# identical to the bare edge); `minYear` floors the release year (default 1900 = no effective floor).
# Tune inline: MATCH (m:MovieRecommendations {steer: 'obscure, and French', minYear: 1970}) RETURN m
- name: MovieRecommendations
  description: Films like the ones you've loved, that you haven't already seen.
  outputLabel: Movie
  params:
    steer:
      type: string
      default: ""
      description: "A soft steer for the picks — a mood, an era, a language ('obscure, and French'). Empty = unsteered."
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)-[:RATED]->(rt:MovieRating) WHERE rt.rating >= 8
    MATCH (rt)-[:SIMILAR_TO {ai: {hint: $steer}}]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND m.year >= $minYear AND m.year <= $maxYear
    RETURN DISTINCT m

# Films like ONE NAMED FILM — "movies like Heat" — excluding anything you've already rated. The anchor
# is PINNED by title, so the engine binds your real MovieRating when you have rated the film, and
# literal-seeds a transient anchor from the title when you haven't (spec §3.3) — you can ask for
# similars to ANY film you can name, rated or not. `movie` has no default (a "like what?" view is
# meaningless bare), so it must be supplied inline:
#   MATCH (m:MoviesLike {movie: 'Heat'}) RETURN m
#   MATCH (m:MoviesLike {movie: 'Heat', steer: 'slow-burn, European', minYear: 1990}) RETURN m
- name: MoviesLike
  description: Films similar to one named film, excluding anything you've already rated. Name the film via the `movie` param.
  outputLabel: Movie
  params:
    movie:
      type: string
      description: "The film to find similars to, e.g. 'Heat'. Required — the view has no meaning without it."
    steer:
      type: string
      default: ""
      description: "A soft steer for the picks — a mood, an era, a language ('obscure, and French'). Empty = unsteered."
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)
    MATCH (rt:MovieRating {title: $movie})-[:SIMILAR_TO {ai: {hint: $steer}}]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND toLower(m.title) <> toLower($movie)
      AND m.year >= $minYear AND m.year <= $maxYear
    RETURN DISTINCT m

# Recommendations from your TASTE AS A WHOLE that you can stream now, INCLUDED with one of your own
# subscriptions (SUBSCRIBES_TO ∩ offerType='subscription' — a rent/buy/free listing on a service you
# have is a paid extra, not "streamable now", so it is excluded). Anchored on the taste profile, not
# per-film similars: the two-stage virtual chain HAS_MOVIE_TASTE_SUMMARY (fan-IN over your ratings) →
# SUGGESTS (fan-OUT off the summary prose), like TasteBasedRecommendations — then AVAILABLE_ON narrows
# to what your services carry. A free-text steer composes on the SUGGESTS edge:
#   -[:SUGGESTS {ai: {hint: 'westerns only', model: 'chat_cheap'}}]->  (steers + tunes generation; stripped before the final read).
# TABULAR: one row per (film, service you have), with the plot and the deep link. A real MATCH on
# AVAILABLE_ON (not EXISTS) binds `s` AND the edge `ao`: watchLink/offerType are per-(film, service)
# facts and live ON THE EDGE (producer edgeProject) — the StreamingService node is shared across films
# (identity serviceId), so reading them off the node would show one film's link on another's row.
- name: StreamableRecommendations
  description: Films matching your overall taste, included with your streaming subscriptions right now — with plot and the link to watch each one.
  params:
    steer:
      type: string
      default: ""
      description: "A soft steer for the taste-based picks ('westerns only', 'something short'). Empty = unsteered."
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)-[:HAS_MOVIE_TASTE_SUMMARY]->(ts:MovieTasteSummary)
    MATCH (ts)-[:SUGGESTS {ai: {hint: $steer}}]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND m.year >= $minYear AND m.year <= $maxYear
    MATCH (m)-[ao:AVAILABLE_ON]->(s:StreamingService)
    WHERE ao.offerType = 'subscription'
      AND EXISTS { (me)-[:SUBSCRIBES_TO]->(:UserStreamingSubscription {serviceId: s.serviceId}) }
    RETURN DISTINCT m.title AS title, m.year AS year, m.genre AS genre, m.director AS director,
           m.imdbRating AS imdbRating, m.imdbVotes AS imdbVotes, m.plot AS plot,
           s.serviceName AS service, ao.watchLink AS watchLink
    ORDER BY coalesce(toFloat(toString(imdbRating)), 0.0) DESC,
             coalesce(imdbVotes, 0) DESC, title ASC, service ASC

# The anti-recommendation, for fun: films like the ones you rated LOW — what you'd probably also hate.
# Same SIMILAR_TO edge, anchored on your DISLIKED films (rating <= 4) instead of your loved ones.
- name: MoviesYoullProbablyHate
  description: Films like the ones you rated poorly — steer clear.
  outputLabel: Movie
  params:
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)-[:RATED]->(rt:MovieRating) WHERE rt.rating <= 4
    MATCH (rt)-[:SIMILAR_TO]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND m.year >= $minYear AND m.year <= $maxYear
    RETURN DISTINCT m

# Film-noir picks, drawn from your taste (similars to your loved films, kept if the genre matches).
- name: NoirRecommendations
  description: Film-noir picks based on what you've loved.
  outputLabel: Movie
  params:
    steer:
      type: string
      default: ""
      description: "A soft steer within noir ('neo-noir', 'classic 40s'). Empty = unsteered."
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)-[:RATED]->(rt:MovieRating) WHERE rt.rating >= 8
    MATCH (rt)-[:SIMILAR_TO {ai: {hint: $steer}}]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND m.genre CONTAINS 'Noir'
      AND m.year >= $minYear AND m.year <= $maxYear
    RETURN DISTINCT m

# Your film taste in ~100 words — the fan-IN MovieTasteSummary node, synthesized from every rating you've
# recorded and cached weekly. Pure Cypher now that the summary is a node: no JS lens, just traverse the edge.
# PARAMETERIZED: `voice` sets the register of the prose reduction via the `{ai: {voice}}` directive
# (the pack ships an Ebert-style `roger` personality — the default keeps the summary in that voice).
# The steering is part of the producer's cache key, so a different voice regenerates rather than
# serving the cached default-voice summary.
- name: MyFilmTaste
  description: A ~100-word read on your taste in film, distilled from your ratings.
  outputLabel: MovieTasteSummary
  params:
    voice:
      type: string
      default: "the warm, erudite voice of film critic Roger Ebert"
      description: "The register the summary is written in — e.g. 'second person, brisk', 'a noir narrator'."
  cypher: |
    MATCH (me:AssistantUser)-[:HAS_MOVIE_TASTE_SUMMARY {ai: {voice: $voice}}]->(ts:MovieTasteSummary)
    RETURN ts

# Recommendations from your taste AS A WHOLE — a two-stage virtual chain: the MovieTasteSummary node
# materializes (fan-IN over your ratings), then SUGGESTS generates films off its prose (fan-OUT). Unlike
# MovieRecommendations (similars to individual loved films), these are picked to match the overall through-lines.
#
# A TABULAR view: it RETURNs specific scalar columns (title, rating, plot, a derived IMDb link, …) and ORDERs
# them, rather than returning the Movie node. A tabular view is TERMINAL — run it to see the table; it can't be
# composed into a traversal as `(v:TasteBasedRecommendations)` the way a node view (MovieRecommendations) can.
# No `outputLabel` (it isn't node-returning). `imdbUrl` is derived from the id; plot/imdbRating are projected
# onto Movie (types/movies.yml). Ordered by IMDb rating desc, then title.
- name: TasteBasedRecommendations
  description: Films picked to match your overall taste — with plot, rating and an IMDb link, best-rated first.
  params:
    steer:
      type: string
      default: ""
      description: "A soft steer for the picks ('westerns only', 'nothing bleak'). Empty = unsteered."
    minYear:
      type: int
      default: 1900
      description: "Only include films released in or after this year."
    maxYear:
      type: int
      default: 2100
      description: "Only include films released in or before this year."
  cypher: |
    MATCH (me:AssistantUser)-[:HAS_MOVIE_TASTE_SUMMARY]->(ts:MovieTasteSummary)
    MATCH (ts)-[:SUGGESTS {ai: {hint: $steer}}]->(m:Movie)
    WHERE NOT EXISTS { (me)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = m.imdbId }
      AND m.year >= $minYear AND m.year <= $maxYear
    RETURN DISTINCT m.title AS title, m.year AS year, m.genre AS genre, m.country AS country,
           m.director AS director, m.runtimeMinutes AS runtime, m.imdbRating AS imdbRating,
           m.plot AS plot, 'https://www.imdb.com/title/' + m.imdbId + '/' AS imdbUrl
    ORDER BY coalesce(toFloat(toString(imdbRating)), 0.0) DESC, title ASC

# ── Multi-person views ──────────────────────────────────────────────────────────────────────
# A MovieRating carries `raterName`/`raterId`, and every rating hangs off its rater by
# `(Person)-[:RATED]->(MovieRating)` — the current user's own ratings included (their AssistantUser
# node is also a Person). So "who rated what" and "what would two people both like" are plain reads over
# MovieRating; no traversal needed since the rater is denormalised onto the rating. MovieRating is a private
# type, so the scope rewriter still confines every row to your own workspace.

# Every rating in the workspace, by person — your own plus anyone you've recorded ratings for.
- name: RatingsByRater
  description: Every recorded rating, grouped by the person who gave it, highest first.
  cypher: |
    MATCH (r:MovieRating)
    RETURN r.raterName AS Rater, r.title AS Film, r.rating AS Score
    ORDER BY Rater ASC, Score DESC, Film ASC

# Films that TWO OR MORE people both love (rated 8+) — the "what would they both like" view. Generic:
# any pair/group who share a loved film shows up, with the list of who loves it.
- name: MutualFavourites
  description: Films loved (8+) by two or more people — who would enjoy a watch together.
  cypher: |
    MATCH (r:MovieRating) WHERE r.rating >= 8
    WITH r.imdbId AS imdbId, r.title AS title, collect(DISTINCT r.raterName) AS lovers
    WHERE size(lovers) >= 2
    RETURN title AS Film, lovers AS LovedBy, size(lovers) AS People
    ORDER BY People DESC, Film ASC

# The flip side — films people DISAGREE on most: one person loves it (8+), another can't stand it (<=3).
- name: DividedOpinions
  description: Films people most disagree on — one loves it, another can't stand it.
  cypher: |
    MATCH (hi:MovieRating) WHERE hi.rating >= 8
    MATCH (lo:MovieRating) WHERE lo.rating <= 3 AND lo.imdbId = hi.imdbId AND lo.raterId <> hi.raterId
    RETURN hi.title AS Film, hi.raterName AS Loves, hi.rating AS LovesScore,
           lo.raterName AS Hates, lo.rating AS HatesScore
    ORDER BY Film ASC
