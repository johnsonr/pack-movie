# Movie domain types.
#
# Deliberately small: just `Movie` (canonical metadata for a film, keyed by IMDb id)
# and `MovieRating` (the user's score for a Movie). Everything else that the
# original movie-finder agent kept on its `MovieBuff` user object — country code,
# preferred streaming services, hobbies, "movie likes / dislikes", free-form
# `about` text — is intentionally NOT redeclared here. That information is the
# user's profile, and the assistant already extracts and stores user-profile
# facts via the DICE proposition pipeline ("user lives in AU", "user uses
# Netflix and Stan", "user likes Tarantino"). Re-modelling it as a separate
# `MovieBuff` entity would just create a second source of truth that drifts
# from the proposition graph.
#
# Both types intentionally use the description-only shorthand for properties.
# When richer typing is needed (e.g. validation rules on `rating`) flip a
# property to the object form — see `src/main/kotlin/com/embabel/assistant/
# workspace/types/PropertySpec.kt` for the schema.

- name: Movie
  description: |
    A film, keyed by IMDb id. The canonical metadata record the assistant
    references when discussing a movie; created on first OMDb lookup and
    re-used for every subsequent rating, recommendation, or recall.
  # Shared reference metadata, NOT user-owned. A film isn't "owned" by a
  # user — the user's relationship to it is the rating. Without this,
  # `Movie` falls to the framework default (`OWNED_BY` from-entry) and
  # every film wrongly gets `(Movie)-[:OWNED_BY]->(User)`, double-anchoring
  # it alongside the rating. `false` makes `MovieRating` the SOLE bridge:
  #   (User)-[:RATED]->(MovieRating)-[:OF]->(Movie)
  userAnchor: false
  properties:
    imdbId:
      identity: true
      description: "IMDb id, e.g. 'tt0110912' for Pulp Fiction. The identity key — the store MERGEs on it (deterministic, workspace-scoped id), so the same film is one Movie node however many times it's referenced."
    title: "Display title, e.g. 'Pulp Fiction'."
    year:
      type: int
      description: "Release year, e.g. 1994. Declared int so queries can range/order on it; OMDb's string is coerced."
    genre: "Comma-separated genres as returned by OMDb, e.g. 'Crime, Drama'."
    director: "Primary director(s) as returned by OMDb."
    runtimeMinutes:
      type: int
      description: "Runtime in minutes, e.g. 175. Declared int so `WHERE m.runtimeMinutes > 120` works; OMDb returns 'NNN min' and the host coerces it to the number on materialization."
  # Methods on a Movie held in working state (`movie.details({})`,
  # `movie.streaming({ country })`) are authored in TypeScript under `src/api/`
  # and COMPILED — they are not declared here. See `src/api/movie.ts` and the
  # README's "Compiled methods" section. This YAML carries only the schema.
  #
  # When the LLM looks a film up via OMDb, auto-bind the result as a Movie in
  # working state (named after a slug of the title, e.g. 'jade') so it's in
  # scope for follow-ups — no explicit save needed. fieldMap maps the OMDb
  # response (Title/imdbID-cased) onto the Movie's own field names.
  retrieval:
    operation: "omdb.getMovie"
    nameFrom: title
    fieldMap:
      imdbId: imdbID
      title: Title
      year: Year
      genre: Genre
      director: Director
      runtimeMinutes: Runtime
  # SIMILAR_TO: films like one the user rated, sourced from the assistant's own film knowledge
  # (see producers/movie.yml — a `knowledge` producer, not an API). Anchored on a rated film's
  # TITLE; each suggestion is resolved to its imdbId so it canonicalizes onto this Movie spine and
  # dedupes against films already rated. It is a LAZY query-time join (NOT persist:true — that flag
  # marks an eager enrichment join, excluded from the query-time registry): the SIMILAR_TO edges are
  # materialized transiently when the query traverses them and rolled back after, exactly like
  # ResearchPaper/GitHubIssue. (Durable caching of static similarity would use the enrichment path —
  # a separate follow-up.) Recommend unseen films with:
  #   MATCH (u:AssistantUser)-[:RATED]->(rt:MovieRating) WHERE rt.rating >= 8
  #   MATCH (rt)-[:SIMILAR_TO]->(rec:Movie)
  #   WHERE NOT EXISTS { MATCH (u)-[:RATED]->(seen:MovieRating) WHERE seen.imdbId = rec.imdbId }
  #   RETURN rec.title, count(*) AS overlap ORDER BY overlap DESC LIMIT 10
  virtualJoins:
    - anchorLabel: MovieRating
      relationship: SIMILAR_TO
      keyField: title              # MovieRating.title — the film the user rated
      recordKeyField: similarTo    # the knowledge producer echoes the anchor title here
      producer: similarMovies
      description: >-
        Films similar to one the user rated, from the assistant's own film knowledge (not an API).
        Ratings are on a 1–10 scale, so anchor recommendations on the films the user LOVED, not merely
        watched: filter `WHERE rt.rating >= 8` (8+/10) — a low-rated film is a negative signal, not a
        "more like this". Each suggestion resolves to its imdbId so it dedupes against already-rated
        films; exclude everything the user has seen with a NOT EXISTS over their MovieRating imdbIds,
        and rank by how many loved films point at each candidate (`count(*) DESC`).

- name: StreamingService
  userAnchor: false
  description: |
    A streaming service (Netflix, Stan, …) a Movie can be watched on in the user's country.
    VIRTUAL — fetched on demand from the Streaming Availability API when a query traverses
    AVAILABLE_ON; never stored. Use it to filter recommendations to films the user can actually
    stream, and to tell them WHERE:
      MATCH (m:Movie)-[:AVAILABLE_ON]->(s:StreamingService) RETURN m.title, collect(s.serviceName)
  properties:
    serviceId:
      identity: true
      description: "Streaming service id, e.g. 'netflix'. Identity key."
    serviceName: "Display name of the service, e.g. 'Netflix'."
    watchLink: "Deep link to the title on the service."
    offerType: "How it's available: subscription / free / rent / buy."
  # AVAILABLE_ON: the streaming options for a Movie in the user's country (producer streamingByImdb).
  # Anchored on Movie.imdbId. A plain MATCH (not OPTIONAL) filters to films that ARE streamable —
  # films with no option in-country simply drop out. Chains after SIMILAR_TO in one query:
  #   MATCH (rt:MovieRating) WHERE rt.rating >= 8
  #   MATCH (rt)-[:SIMILAR_TO]->(m:Movie)
  #   WHERE NOT EXISTS { (:MovieRating {imdbId: m.imdbId}) }
  #   MATCH (m)-[:AVAILABLE_ON]->(s:StreamingService)
  #   RETURN m.title, collect(DISTINCT s.serviceName) AS services
  virtualJoins:
    - anchorLabel: Movie
      relationship: AVAILABLE_ON
      keyField: imdbId            # Movie.imdbId
      recordKeyField: imdbId      # stamped onto each option by the producer's echoKeyAs
      producer: streamingByImdb
      description: >-
        Streaming services where this Movie can be watched in the user's country. Only films with at
        least one option appear, so a plain MATCH filters recommendations to what the user can stream.

- name: UserStreamingSubscription
  description: |
    A streaming service the CURRENT USER subscribes to — the per-user half of the streaming catalog.
    Seeded from pack reference data (reference/streaming-services.yml). The userAnchor gives
    (:AssistantUser)-[:SUBSCRIBES_TO]->(:UserStreamingSubscription); filter recommendations to what the
    user can actually watch by intersecting a Movie's AVAILABLE_ON services on serviceId:
      MATCH (m:Movie)-[:AVAILABLE_ON]->(s:StreamingService)
      WHERE EXISTS { (:AssistantUser)-[:SUBSCRIBES_TO]->(:UserStreamingSubscription {serviceId: s.serviceId}) }
  userAnchor:
    predicate: SUBSCRIBES_TO
    direction: from-user
  properties:
    serviceId:
      identity: true
      description: "Streaming service id (matches StreamingService.serviceId / the API's service.id), e.g. 'netflix'."
    serviceName: "Display name, e.g. 'Netflix'."

- name: MovieRating
  description: |
    The current user's rating for a Movie. Use this to record what the user
    thinks of films they've watched. One rating per (user, movie) — when the
    user re-rates a movie, update the existing entry rather than creating a
    second one. Reads of this collection power "what have I rated?", "what
    did I think of X?", and the "exclude already-seen" filter when proposing
    new recommendations.
  # `(User)-[:RATED]->(MovieRating)` reads more naturally than the default
  # `(MovieRating)-[:OWNED_BY]->(User)` for the recall query "what have I
  # rated?" — `MATCH (u:User {id: $userId})-[:RATED]->(r) RETURN r`.
  # The framework emits this edge automatically on every `create_entry`
  # against this type — see RepositoryStore.applyUserAnchor.
  userAnchor:
    predicate: RATED
    direction: from-user
  properties:
    imdbId:
      identity: true
      description: "IMDb id of the rated Movie. The identity key: with the user anchor giving workspace scope, this yields one rating per (user, movie) — a re-rate updates in place instead of duplicating. Use the same value as the corresponding Movie.imdbId so the two records can be joined."
    title: "Title of the rated movie, denormalised for cheap recall without a join."
    rating:
      type: int
      required: true
      description: "Score from 1 (terrible) to 10 (masterpiece). Whole numbers only."
    notes: "Optional one-line reaction from the user, in their own words."
    watchedOn: "Optional ISO-8601 date the user watched the movie."
