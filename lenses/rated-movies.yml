# Your rated films, as Movie cards. Focuses the Movie nodes you've RATED (joined
# to the MovieRating by imdbId) and presents kind: entities, so they render
# through the typed-component host — each card showing its poster/trailer and your
# saved rating (the widget pre-fills it).
id: rated-movies
name: Rated Movies
description: The films you've rated — highest first.
spec:
  kind: cypherscript
  script: |
    const rows = await gateway.kg.query({
      cypher: `MATCH (au:AssistantUser)-[:RATED]->(r:MovieRating)
               MATCH (m:Movie) WHERE m.imdbId = r.imdbId
               RETURN m.id AS id ORDER BY r.rating DESC, r.title ASC`,
      params: JSON.stringify({}),
    });
    await gateway.lens.focus({ ids: (rows || []).map(x => x.id).filter(Boolean) });
    await gateway.lens.present({ content: JSON.stringify({ kind: "entities" }) });
