# View 3 ‚Äî a summary of your film taste. This is now a THIN reader over the `MovieTasteSummary` VIRTUAL NODE:
# the fan-in `movieTasteSummary` producer (see producers/movie.yml) gathers your MovieRatings and reduces them
# to one node via the `synthesize` LLM aggregation, cached weekly. So the reduction lives in the graph, not in
# this lens ‚Äî the lens just traverses HAS_MOVIE_TASTE_SUMMARY and presents `ts.summary`.
id: taste-summary
name: Your Film Taste
description: A short read on what you love and avoid, drawn from your ratings.
spec:
  kind: cypherscript
  script: |
    const rows = await gateway.kg.query({
      cypher: `MATCH (me:AssistantUser)-[:HAS_MOVIE_TASTE_SUMMARY]->(ts:MovieTasteSummary)
               RETURN ts.summary AS summary, ts.count AS count`,
      params: JSON.stringify({}),
    });
    const r = (rows && rows[0]) || {};
    const body = r.summary
      ? `${r.summary}\n\n_Distilled from ${r.count || 0} ratings._`
      : "Rate a few films and your taste summary will appear here.";
    await gateway.lens.present({ content: JSON.stringify({
      kind: "text",
      title: "Your film taste",
      markdown: body,
    }) });
